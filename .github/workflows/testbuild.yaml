name: Build OpenWrt

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Get openwrt sources
        run: |
          git clone --depth 1 https://github.com/openwrt/openwrt.git
          
      - name: Run builder script
        run: |
          cd openwrt;
          ./scripts/feeds update -a && ./scripts/feeds install -a
          cp ../configs/bpi-r4.config .config
          make -j $(nproc) defconfig
          cat .config
