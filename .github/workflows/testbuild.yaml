name: Test Build OpenWrt

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Get openwrt sources
        run: |
          git clone --depth 1 https://github.com/openwrt/openwrt.git
          
      - name: Run builder script
        run: |
          cd openwrt;
          ./scripts/feeds update -a && ./scripts/feeds install -a
          cat > .config << 'EOF'
CONFIG_TARGET_mediatek=y
CONFIG_TARGET_mediatek_filogic=y
CONFIG_TARGET_mediatek_filogic_DEVICE_bananapi_bpi-r4=y
EOF
          make defconfig

      - name: Display config
        run: |
          cd openwrt;
          cat .config
