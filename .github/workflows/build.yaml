name: Build OpenWrt

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Get openwrt sources
        run: |
          git clone https://github.com/openwrt/openwrt.git
          
      - name: Run builder script
        run: |
          cd openwrt;
          ./scripts/feeds update -a && ./scripts/feeds install -a
          printf "CONFIG_TARGET_mediatek=y\nCONFIG_TARGET_mediatek_filogic=y\nCONFIG_TARGET_mediatek_filogic_DEVICE_bananapi_bpi-r4=y\n" > .config
          mkdir -p package/kernel/mt76/patches
          curl -SL https://github.com/openwrt/mt76/commit/8088940ffd047a6d282a95af829562e8038f5b2d.patch > package/kernel/mt76/patches/001-Add-tx_power-check-Yukariin.patch
          curl -SL https://github.com/openwrt/mt76/commit/aaf90b24fde77a38ee9f0a60d7097ded6a94ad1f.patch > package/kernel/mt76/patches/002-use-tx_power-from-default-fw-if-EEPROM-contains-0s-im-0.patch
          make -j $(nproc) defconfig download clean world

      - name: Create ZIP with all images
        if: success()
        run: |
          cd openwrt/bin/targets/mediatek/filogic
          zip -r openwrt-bpi-r4-images.zip .

      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v7
        with:
          path: openwrt/bin/targets/mediatek/filogic/openwrt-bpi-r4-images.zip
