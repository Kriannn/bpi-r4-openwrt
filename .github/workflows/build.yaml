name: Build OpenWrt

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get openwrt sources
        run: |
          git clone --depth 1 https://github.com/openwrt/openwrt.git
          cd openwrt

      - name: Free disk space on runner
        run: |
          sudo rm -rf \
            "$AGENT_TOOLSDIRECTORY" \
            /opt/ghc \
            /opt/google/chrome \
            /opt/microsoft/msedge \
            /opt/microsoft/powershell \
            /opt/pipx \
            /usr/lib/mono \
            /usr/local/julia* \
            /usr/local/lib/android \
            /usr/local/lib/node_modules \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/share/dotnet \
            /usr/share/swift
          df -h

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Run builder script
        run: |
          chmod +x ./bpi-r4-openwrt-builder.sh
          ./bpi-r4-openwrt-builder.sh

      - name: List built images
        if: always()
        run: |
          ls -R openwrt/bin/targets || true

      - name: Create ZIP with all images
        if: success()
        run: |
          cd openwrt/bin/targets/mediatek/filogic
          zip -r openwrt-bpi-r4-images.zip .

      - name: Upload firmware artifacts (latest)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-bpi-r4-images
          path: openwrt/bin/targets/mediatek/filogic/openwrt-bpi-r4-images.zip

      - name: Create or update GitHub Release (latest)
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bpi-r4-latest
          name: "BananaPi BPI-R4 OpenWrt Build (latest)"
          body: |
            Build date: $(date -u +"%Y-%m-%d %H:%M UTC")
          draft: false
          prerelease: false
          files: |
            openwrt/bin/targets/mediatek/filogic/openwrt-bpi-r4-images.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
